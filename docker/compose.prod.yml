name: deasy-prod

services:
  mariadb:
    env_file:
      - .env.prod
    restart: always
    ports:
      - "23306:3306"

  mongodb:
    env_file:
      - .env.prod
    restart: always
    ports:
      - "22717:27017"

  rabbitmq:
    env_file:
      - .env.prod
    restart: always
    ports:
      - "25672:5672"
      - "25673:15672"

  emqx:
    env_file:
      - .env.prod
    restart: always
    ports:
      - "21883:1883"
      - "28084:18083"

  minio:
    env_file:
      - .env.prod
    restart: always
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

  minio-bootstrap:
    env_file:
      - .env.prod

  minio-publish-seeds:
    env_file:
      - .env.prod

  minio-publish:
    env_file:
      - .env.prod

  backend:
    env_file:
      - .env.prod
    restart: always
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3030/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "${BACKEND_PORT}:3030"

  storage-uploader:
    env_file:
      - .env.prod
    restart: always
    security_opt:
      - no-new-privileges:true

  frontend:
    env_file:
      - .env.prod
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${FRONTEND_PORT}:8080"

  signer:
    env_file:
      - .env.prod
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:4000/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "24000:4000"

  analytics:
    env_file:
      - .env.prod
    restart: always
    security_opt:
      - no-new-privileges:true

volumes:
  mariadb_data:
    name: deasy_prod_mariadb_data
  mongodb_data:
    name: deasy_prod_mongodb_data
  rabbitmq_data:
    name: deasy_prod_rabbitmq_data
  emqx_data:
    name: deasy_prod_emqx_data
  emqx_log:
    name: deasy_prod_emqx_log
  minio_data:
    name: deasy_prod_minio_data
  backend_node_modules_v2:
    name: deasy_prod_backend_node_modules
  frontend_node_modules:
    name: deasy_prod_frontend_node_modules
  uploads_data:
    name: deasy_prod_uploads_data
  storage_data:
    name: deasy_prod_storage_data

networks:
  default:
    name: deasy_prod_network
