name: deasy-qa

x-runtime-env-file: &qa_runtime_env_file
  - ${DEASY_CONTAINER_ENV_FILE:-.env.qa}

services:
  mariadb:
    env_file: *qa_runtime_env_file
    ports:
      - "13306:3306"

  mongodb:
    env_file: *qa_runtime_env_file
    ports:
      - "12717:27017"

  rabbitmq:
    env_file: *qa_runtime_env_file
    ports:
      - "15672:5672"
      - "15673:15672"

  emqx:
    env_file: *qa_runtime_env_file
    ports:
      - "11883:1883"
      - "18084:18083"

  minio:
    env_file: *qa_runtime_env_file
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

  minio-bootstrap:
    env_file: *qa_runtime_env_file

  minio-publish-seeds:
    env_file: *qa_runtime_env_file

  minio-publish:
    env_file: *qa_runtime_env_file

  backend:
    image: ${IMAGE_REGISTRY}/${BACKEND_IMAGE_REPOSITORY}:${BACKEND_IMAGE_TAG}
    pull_policy: always
    env_file: *qa_runtime_env_file
    networks:
      default: {}
      public-ingress:
        aliases:
          - deasy-qa-backend

  storage-uploader:
    image: ${IMAGE_REGISTRY}/${BACKEND_IMAGE_REPOSITORY}:${BACKEND_IMAGE_TAG}
    pull_policy: always
    env_file: *qa_runtime_env_file

  frontend:
    image: ${IMAGE_REGISTRY}/${FRONTEND_IMAGE_REPOSITORY}:${FRONTEND_IMAGE_TAG}
    pull_policy: always
    env_file: *qa_runtime_env_file
    networks:
      default: {}
      public-ingress:
        aliases:
          - deasy-qa-frontend

  signer:
    image: ${IMAGE_REGISTRY}/${SIGNER_IMAGE_REPOSITORY}:${SIGNER_IMAGE_TAG}
    pull_policy: always
    env_file: *qa_runtime_env_file
    ports:
      - "14000:4000"

  analytics:
    image: ${IMAGE_REGISTRY}/${ANALYTICS_IMAGE_REPOSITORY}:${ANALYTICS_IMAGE_TAG}
    pull_policy: always
    env_file: *qa_runtime_env_file

volumes:
  mariadb_data:
    name: deasy_qa_mariadb_data
  mongodb_data:
    name: deasy_qa_mongodb_data
  rabbitmq_data:
    name: deasy_qa_rabbitmq_data
  emqx_data:
    name: deasy_qa_emqx_data
  emqx_log:
    name: deasy_qa_emqx_log
  minio_data:
    name: deasy_qa_minio_data
  backend_node_modules_v2:
    name: deasy_qa_backend_node_modules
  frontend_node_modules:
    name: deasy_qa_frontend_node_modules
  uploads_data:
    name: deasy_qa_uploads_data
  storage_data:
    name: deasy_qa_storage_data

networks:
  default:
    name: deasy_qa_network
  public-ingress:
    name: ${PUBLIC_INGRESS_NETWORK:-deasy_public_ingress}
    external: true
