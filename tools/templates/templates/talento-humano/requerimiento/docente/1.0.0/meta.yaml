key: "talento-humano/requerimiento/docente"
export_id: "tpl_talento_humano_requerimiento_docente"
name: "Requerimiento Docente"
seed_code: "informe-docente"
seed: "informe-docente"
# repository_stage: draft | review | approved | published | archived
repository_stage: published
version: 1.0.0
storage_version: v0001
modes:
  system:
    jinja2:
      path: "modes/system/jinja2/src"
  user:
    docx:
      path: "modes/user/docx/src"
    latex:
      path: "modes/user/latex/src"
    pdf:
      path: "modes/user/pdf/src"
    xlsx:
      path: "modes/user/xlsx/src"
origins: []
workflows:
  fill:
    required: true
    source: "artifact"
    sync_mode: "artifact_to_db"
    steps:
      - order: 1
        code: "coordinador_inicio"
        name: "Inicio del coordinador de carrera"
        resolver:
          type: "document_owner"
          selection_mode: "auto_one"
        field_refs:
          - "general.semestre"
          - "general.titulo"
          - "general.carrera"
          - "general.coordinador"
          - "display.show_firmas"
          - "display.show_bibliography"
          - "signatures.elaborado.nombre"
          - "signatures.elaborado.cargo"
          - "signatures.elaborado.fecha"
        required: true
        can_reject: true
      - order: 2
        code: "asistente_docencia_revision"
        name: "Revision de Asistente de Docencia y Estudiantes"
        resolver:
          type: "cargo_in_scope"
          cargo_code: "asistente"
          unit_scope_type: "unit_exact"
          unit_id: 6
          selection_mode: "auto_one"
        field_refs:
          - "signatures.revisado.nombre"
          - "signatures.revisado.cargo"
          - "signatures.revisado.fecha"
        required: true
        can_reject: true
      - order: 3
        code: "asistente_tthh_revision"
        name: "Revision de Asistente de Talento Humano"
        resolver:
          type: "cargo_in_scope"
          cargo_code: "asistente"
          unit_scope_type: "unit_exact"
          unit_id: 12
          selection_mode: "auto_one"
        field_refs:
          - "signatures.aprobado.nombre"
          - "signatures.aprobado.cargo"
          - "signatures.aprobado.fecha"
        required: true
        can_reject: true
      - order: 4
        code: "responsable_financiero_revision"
        name: "Validacion de Responsable Financiero"
        resolver:
          type: "cargo_in_scope"
          cargo_code: "responsable"
          unit_scope_type: "unit_exact"
          unit_id: 13
          selection_mode: "auto_one"
        field_refs:
          - "signatures.aprobado.nombre"
          - "signatures.aprobado.cargo"
          - "signatures.aprobado.fecha"
        required: true
        can_reject: true
  signatures:
    required: true
    source: "artifact"
    sync_mode: "artifact_to_db"
    pattern_ref: "signatures/three-stage-era"
    anchors:
      - code: "firma_elaborado"
        placement:
          strategy: "token"
          token_field_ref: "signatures.elaborado.token"
        size:
          width: 124
          height: 48
      - code: "firma_revisado"
        placement:
          strategy: "token"
          token_field_ref: "signatures.revisado.token"
        size:
          width: 124
          height: 48
      - code: "firma_aprobado"
        placement:
          strategy: "token"
          token_field_ref: "signatures.aprobado.token"
        size:
          width: 124
          height: 48
    steps:
      - order: 1
        code: "firma_docente"
        name: "Firma del docente"
        step_type_code: "electronic"
        required_cargo_code: "coordinador_carrera"
        selection_mode: "auto_all"
        required_signers_min: 1
        required_signers_max: 1
        required: true
        anchor_refs:
          - "firma_elaborado"
      - order: 2
        code: "firma_calidad"
        name: "Firma de calidad"
        step_type_code: "electronic"
        required_cargo_code: "responsable_aseguramiento_calidad"
        selection_mode: "auto_all"
        required_signers_min: 1
        required_signers_max: 1
        required: true
        anchor_refs:
          - "firma_revisado"
      - order: 3
        code: "firma_direccion"
        name: "Firma de direccion"
        step_type_code: "electronic"
        required_cargo_code: "director_escuela"
        selection_mode: "auto_all"
        required_signers_min: 1
        required_signers_max: 1
        required: true
        anchor_refs:
          - "firma_aprobado"
dependencies:
  templates: []
  data: []
